name: Python linter

on:
  push:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: setup python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: run dependencies
        run: pip install -r requirements.txt

      - name: run linter
        run: flake8 app.py
